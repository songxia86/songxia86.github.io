<title>Evan Song's 10th Birthday Party — RSVP</title>
<meta name="description" content="You're invited to Evan Song's 10th birthday go-kart party! Tap to RSVP." />
<meta name="theme-color" content="#000000" />
<meta property="og:title" content="Evan Song's 10th Birthday Party" />
<meta property="og:description" content="Let's race & celebrate! Tap to RSVP." />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  html, body { min-height: 100%; }
  body {
    background: #000;
    font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .poster {
    display: block;
    width: 100%;
    height: auto;
    animation: fade .7s ease both;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  /* Slim top progress line that depletes over the countdown */
  .progress {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    width: 100%;
    transform: scaleX(1);
    transform-origin: left center;
    background: linear-gradient(90deg, #ffb23e, #ff5a1f);
    box-shadow: 0 0 14px rgba(255,90,31,0.55);
    z-index: 20;
    transition: transform 1s linear;
    will-change: transform;
  }

  /* Minimal, tasteful countdown chip */
  .chip {
    position: fixed;
    left: 50%;
    bottom: calc(18px + env(safe-area-inset-bottom, 0px));
    transform: translateX(-50%);
    z-index: 20;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 15px 8px 9px;
    border-radius: 999px;
    background: rgba(12,12,14,0.5);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.92);
    font-size: 13px;
    letter-spacing: .01em;
    box-shadow: 0 10px 30px -12px rgba(0,0,0,0.8);
    animation: chipIn .6s .35s ease both;
  }
  @keyframes chipIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .chip .ring { position: relative; width: 26px; height: 26px; flex: 0 0 auto; }
  .chip .ring svg { transform: rotate(-90deg); display: block; }
  .chip .ring .track { stroke: rgba(255,255,255,0.16); }
  .chip .ring .prog {
    stroke: url(#grad);
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
  }
  .chip .num {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    font-size: 11px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #fff;
  }
  .chip .label { white-space: nowrap; opacity: .9; }
  .chip .label b { font-weight: 600; color: #ffca7a; }

  @media (max-width: 380px) {
    .chip { font-size: 12px; padding: 7px 13px 7px 8px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .poster, .chip { animation: none; }
  }
</style>

    <span class="ring">
      <svg width="26" height="26" viewBox="0 0 26 26">
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#ffb23e" />
            <stop offset="1" stop-color="#ff5a1f" />
          </linearGradient>
        </defs>
        <circle class="track" cx="13" cy="13" r="11" fill="none" stroke-width="2.5" />
        <circle class="prog" id="progRing" cx="13" cy="13" r="11" fill="none" stroke-width="2.5" />
      </svg>
      <span class="num" id="count">15</span>
    </span>
    <span class="label">Opening RSVP in <b><span id="countText">15</span>s</b></span>
  </div>

<script>
(function () {
  var DEST = "https://evite.me/DA3a5ueZ5v";
  var TOTAL = 15;

  var ring = document.getElementById("progRing");
  var r = 11;
  var circ = 2 * Math.PI * r;
  ring.style.strokeDasharray = circ.toFixed(2);
  ring.style.strokeDashoffset = "0";

  var bar = document.getElementById("progress");
  var countEl = document.getElementById("count");
  var countText = document.getElementById("countText");
  var remaining = TOTAL;
  var redirected = false;

  function go() {
    if (redirected) return;
    redirected = true;
    window.location.href = DEST;
  }

  function render() {
    countEl.textContent = remaining;
    countText.textContent = remaining;
    var frac = remaining / TOTAL;
    ring.style.strokeDashoffset = (circ * (1 - frac)).toFixed(2);
    bar.style.transform = "scaleX(" + frac + ")";
  }
  render();

  var timer = setInterval(function () {
    remaining -= 1;
    if (remaining < 0) remaining = 0;
    render();
    if (remaining <= 0) { clearInterval(timer); go(); }
  }, 1000);

  // Tap or click anywhere goes straight to the RSVP page
  document.addEventListener("click", function (e) { if (e) e.preventDefault(); go(); });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(); }
  });
})();
</script>
