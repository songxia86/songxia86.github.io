<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=768">
<title>F1 2026 Drivers Championship</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&family=Playfair+Display:wght@400;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body { margin: 0; width: 768px; height: 1024px; overflow: hidden; background: #e8e6e1; color: #000; font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.4; }

.page { width: 768px; height: 1024px; padding: 20px; display: flex; flex-direction: column; background: #fff; border-radius: 12px; border: 1px solid #d0cec9; box-sizing: border-box; position: relative; overflow: hidden; }

/* Header */
.header { display: flex; flex-direction: column; padding: 0 4px; margin-bottom: 12px; }
.header-title { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 36px; letter-spacing: -1px; line-height: 1; color: #000; }
.header-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: #666; margin-top: 4px; }

/* Top 3 Row */
.top3-row { display: flex; gap: 8px; margin-bottom: 10px; }
.top3-card {
  flex: 1; height: 140px; background: #f4f3f0; border-radius: 8px; border: 1px solid #d0cec9;
  display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
  padding: 8px 12px; position: relative; overflow: hidden;
}
.top3-pos-badge {
  position: absolute; top: 50%; right: 2px; transform: translateY(-50%);
  font-family: 'Playfair Display', serif; font-size: 80px; font-weight: 900;
  color: #000; opacity: 0.15; line-height: 1; pointer-events: none;
}
.top3-photo {
  width: 70px; height: 70px; border-radius: 50%; border: 2px solid #d0cec9;
  object-fit: cover; filter: grayscale(1); flex-shrink: 0; margin-bottom: 4px;
}
.top3-name-line { display: flex; align-items: baseline; gap: 4px; justify-content: center; }
.top3-line1 { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 400; color: #000; margin-top: 4px; }
.top3-line1 b { font-weight: 700; }
.top3-line2 { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 400; color: #666; margin-top: 2px; }
.top3-pts {
  font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700;
  color: #fff; background: #000; border-radius: 16px; padding: 2px 14px;
  white-space: nowrap; margin-top: 4px;
}

/* P4-P22 Grid */
.grid-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 4px 8px;
  flex: 1; overflow: hidden;
}
.grid-card {
  height: 64px; display: flex; flex-direction: column; justify-content: center; padding: 6px 14px;
  background: #fff; border: 1px solid #e8e6e1; border-radius: 6px;
  position: relative; overflow: hidden;
}
.grid-watermark {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 900;
  color: #000; opacity: 0.12; line-height: 1; pointer-events: none;
}
.grid-line1 { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 400; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.grid-line1 b { font-weight: 700; }
.grid-line2 { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 400; color: #666; margin-top: 3px; }

.error-msg { font-family: 'Inter', sans-serif; font-size: 16px; color: #999; padding: 24px 0; text-align: center; }
.loading-msg { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #999; padding: 32px 0; text-align: center; letter-spacing: 1px; }

.timestamp {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 400; color: #bbb;
  position: absolute; bottom: 8px; right: 16px;
}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <span class="header-title">F1 2026</span>
    <div class="header-sub">Drivers Championship</div>
  </div>

  <div id="drivers-container">
    <div class="loading-msg">Loading standings...</div>
  </div>

  <span class="timestamp" id="timestamp"></span>
</div>

<script>
(async function() {
  document.getElementById('timestamp').textContent = (function() {
    var d = new Date();
    return d.getUTCFullYear() + '-' + String(d.getUTCMonth()+1).padStart(2,'0') + '-' +
      String(d.getUTCDate()).padStart(2,'0') + ' ' + String(d.getUTCHours()).padStart(2,'0') + ':' +
      String(d.getUTCMinutes()).padStart(2,'0') + ' UTC';
  })();

  var API = 'https://api.openf1.org/v1';

  function fetchJSON(url) {
    return fetch(url).then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
  }

  function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  function posChange(entry) {
    var start = entry.position_start;
    var current = entry.position_current;
    if (start == null || current == null) return 0;
    return start - current;
  }

  function changeHTML(change) {
    if (change > 0) return '<span class="up">\u25B2' + change + '</span>';
    if (change < 0) return '<span class="down">\u25BC' + Math.abs(change) + '</span>';
    return '<span class="same">\u2014</span>';
  }

  try {
    var results = await Promise.all([
      fetchJSON(API + '/drivers?session_key=latest').catch(function() { return []; }),
      fetchJSON(API + '/championship_drivers?session_key=latest').catch(function() { return []; })
    ]);
    var driversRaw = results[0];
    var champ = results[1];

    var map = {};
    (driversRaw || []).forEach(function(d) { if (d.driver_number != null) map[d.driver_number] = d; });

    var sorted = (champ || []).slice().sort(function(a, b) {
      var pa = a.position_current || 999, pb = b.position_current || 999;
      return pa !== pb ? pa - pb : (b.points_current || 0) - (a.points_current || 0);
    });

    var rows = sorted.slice(0, 22);
    if (!rows.length) {
      document.getElementById('drivers-container').innerHTML = '<div class="error-msg">Data unavailable</div>';
    } else {
      var html = '';

      // Top 3 Row - vertical card layout
      html += '<div class="top3-row">';
      for (var i = 0; i < 3 && i < rows.length; i++) {
        var e = rows[i];
        var d = map[e.driver_number] || {};
        var fullName = d.full_name || e.driver_name || 'Driver #' + e.driver_number;
        var firstName = d.first_name || '';
        var lastName = d.last_name || '';
        if (!firstName && !lastName) {
          var parts = fullName.trim().split(/\s+/);
          if (parts.length > 1) { lastName = parts.pop(); firstName = parts.join(' '); }
          else { lastName = fullName; }
        }
        var code = d.name_acronym || (lastName ? lastName.substring(0, 3).toUpperCase() : '???');
        var pts = e.points_current != null ? e.points_current : '\u2014';
        var pos = e.position_current || (i + 1);
        var headshot = d.headshot_url || '';
        var num = d.driver_number || e.driver_number || '';

        html += '<div class="top3-card">';
        html += '<span class="top3-pos-badge">P' + pos + '</span>';
        if (headshot) {
          html += '<img class="top3-photo" src="' + esc(headshot) + '" alt="" onerror="this.style.display=\'none\'">';
        }
        html += '<div class="top3-line1">' + esc(firstName) + ' <b>' + esc(lastName) + '</b></div>';
        html += '<div class="top3-line2">#' + esc(String(num)) + ' ' + esc(code) + ' <span class="top3-pts-inline">' + pts + 'pts</span></div>';
        html += '</div>';
      }
      html += '</div>';

      // P4-P22 Grid - 2 columns
      html += '<div class="grid-container">';
      for (var i = 3; i < rows.length; i++) {
        var e = rows[i];
        var d = map[e.driver_number] || {};
        var fullName = d.full_name || e.driver_name || 'Driver #' + e.driver_number;
        var firstName = d.first_name || '';
        var lastName = d.last_name || '';
        if (!firstName && !lastName) {
          var parts = fullName.trim().split(/\s+/);
          if (parts.length > 1) { lastName = parts.pop(); firstName = parts.join(' '); }
          else { lastName = fullName; }
        }
        var code = d.name_acronym || (lastName ? lastName.substring(0, 3).toUpperCase() : '???');
        var team = d.team_name || e.team_name || '';
        var pts = e.points_current != null ? e.points_current : '\u2014';
        var pos = e.position_current || (i + 1);
        var num = d.driver_number || e.driver_number || '';
        var change = posChange(e);

        html += '<div class="grid-card">';
        html += '<span class="grid-watermark">P' + pos + '</span>';
        html += '<div class="grid-line1">' + esc(firstName) + ' <b>' + esc(lastName) + '</b></div>';
        html += '<div class="grid-line2">#' + esc(String(num)) + ' ' + esc(code) + ' ' + pts + 'pts</div>';
        html += '</div>';
      }
      html += '</div>';

      document.getElementById('drivers-container').innerHTML = html;
    }
  } catch (e) {
    document.getElementById('drivers-container').innerHTML = '<div class="error-msg">Data unavailable</div>';
  }

  document.body.setAttribute('data-loaded', 'true');
})();
</script>
</body>
</html>
