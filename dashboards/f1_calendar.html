<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=768">
<title>F1 2026 Race Calendar</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&family=Playfair+Display:wght@400;700;900&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  margin: 0;
  width: 768px;
  height: 1024px;
  overflow: hidden;
  background: #e8e6e1;
  color: #000;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.4;
}

.page {
  width: 768px;
  height: 1024px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  background: #fff;
  border-radius: 12px;
  border: 1px solid #d0cec9;
  box-sizing: border-box;
  position: relative;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4px;
  margin-bottom: 0;
  flex-shrink: 0;
  height: 45px;
}

.header-left {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.header-title {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 36px;
  letter-spacing: -1px;
  line-height: 1;
  color: #000;
}

.header-subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #444;
}

.progress-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  color: #000;
  border: 1.5px solid #000;
  border-radius: 12px;
  padding: 2px 10px;
  white-space: nowrap;
}

/* Previous Race Strip */
.prev-race-strip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 8px;
  border-bottom: 1px solid #e8e6e1;
  flex-shrink: 0;
  height: 50px;
}

.prev-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #444;
  margin-right: 10px;
}

.prev-name {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 16px;
  color: #444;
}

.prev-right {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  color: #888;
}

/* Hero Section */
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
  overflow: hidden;
}

.hero-upnext {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #000;
  border: 1.5px solid #000;
  border-radius: 10px;
  padding: 3px 16px;
  margin-bottom: 16px;
}

.hero-round {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 400;
  color: #444;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.hero-race-name {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 56px;
  line-height: 1.05;
  letter-spacing: -2px;
  color: #000;
  text-align: center;
  margin-bottom: 12px;
}

.hero-location {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  color: #555;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 0;
}

.hero-location i {
  font-size: 14px;
  color: #444;
}

.hero-track-img {
  width: 420px;
  height: auto;
  filter: grayscale(1);
  opacity: 0.9;
  margin-top: 35px;
  margin-bottom: 30px;
}

.hero-today-row {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 20px;
}

.hero-today-when {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 32px;
  line-height: 1;
  color: #000;
}

.hero-today-session {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  color: #333;
}

.session-pills {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

.s-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  border: 1px solid #d0cec9;
  border-radius: 8px;
  padding: 6px 12px;
  text-align: center;
  line-height: 1.3;
  background: #fff;
}

.s-pill .s-label {
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #444;
  display: block;
}

.s-pill .s-time {
  color: #333;
  font-weight: 600;
}

.s-pill.is-next {
  border-color: #000;
  border-width: 1.5px;
}

.s-pill.is-next .s-label {
  color: #000;
}

.s-pill.is-next .s-time {
  color: #000;
}

.s-pill.is-race {
  background: #f4f3f0;
}

.s-tz {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: #888;
  letter-spacing: 1px;
  align-self: center;
  margin-left: 2px;
}

/* After Next Strip */
.after-race-strip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 8px;
  border-top: 1px solid #e8e6e1;
  flex-shrink: 0;
  height: 50px;
}

.after-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #444;
  margin-right: 10px;
}

.after-name {
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 16px;
  color: #444;
}

.after-right {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  color: #444;
}

/* Loading / Error */
.loading-state {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  color: #444;
  letter-spacing: 1px;
}

.error-state {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  color: #555;
  text-align: center;
  line-height: 1.6;
  white-space: pre-line;
}

.timestamp {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 400;
  color: #888;
  position: absolute;
  top: 28px;
  right: 20px;
}
</style>
</head>
<body>
<div class="page" id="app">
  <div class="loading-state" id="loading">LOADING RACE DATA</div>
</div>
<span class="timestamp" id="timestamp"></span>

<script>
(async function() {
  document.getElementById('timestamp').textContent = (function() {
    var d = new Date();
    return d.getUTCFullYear() + '-' + String(d.getUTCMonth()+1).padStart(2,'0') + '-' +
      String(d.getUTCDate()).padStart(2,'0') + ' ' + String(d.getUTCHours()).padStart(2,'0') + ':' +
      String(d.getUTCMinutes()).padStart(2,'0') + ' UTC';
  })();

  var YEAR = 2026;
  var now = new Date();

  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function formatDate(dateStr) {
    var d = new Date(dateStr);
    return months[d.getUTCMonth()] + ' ' + d.getUTCDate();
  }

  function formatDateRange(startStr, endStr) {
    var s = new Date(startStr);
    var e = new Date(endStr);
    var sMonth = months[s.getUTCMonth()];
    var eMonth = months[e.getUTCMonth()];
    var sDay = s.getUTCDate();
    var eDay = e.getUTCDate();
    if (sMonth === eMonth) {
      return sMonth + ' ' + sDay + '\u2013' + eDay;
    }
    return sMonth + ' ' + sDay + '\u2013' + eMonth + ' ' + eDay;
  }

  function formatDateRangeUpper(startStr, endStr) {
    var s = new Date(startStr);
    var e = new Date(endStr);
    var sMonth = months[s.getUTCMonth()].toUpperCase();
    var eMonth = months[e.getUTCMonth()].toUpperCase();
    var sDay = s.getUTCDate();
    var eDay = e.getUTCDate();
    if (sMonth === eMonth) {
      return sMonth + ' ' + sDay + '\u2013' + eDay;
    }
    return sMonth + ' ' + sDay + '\u2013' + eMonth + ' ' + eDay;
  }

  async function fetchJSON(url) {
    var maxRetries = 4;
    for (var attempt = 0; attempt < maxRetries; attempt++) {
      try {
        var resp = await fetch(url);
        if (resp.status === 429) {
          var wait = Math.pow(2, attempt) * 2000 + Math.random() * 1000;
          console.warn('Rate limited on ' + url + ', retry in ' + Math.round(wait) + 'ms');
          await new Promise(function(r) { setTimeout(r, wait); });
          continue;
        }
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return await resp.json();
      } catch (err) {
        if (attempt < maxRetries - 1) {
          var wait = Math.pow(2, attempt) * 1500 + Math.random() * 500;
          console.warn('Fetch error on ' + url + ': ' + err.message + ', retry in ' + Math.round(wait) + 'ms');
          await new Promise(function(r) { setTimeout(r, wait); });
        } else {
          throw err;
        }
      }
    }
    throw new Error('Failed after ' + maxRetries + ' retries');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function isSprint(sessions) {
    return sessions.some(function(s) {
      var name = (s.session_name || '').toLowerCase();
      return name === 'sprint' || name === 'sprint qualifying';
    });
  }

  function render(meetings, sessions) {
    // Filter out testing meetings and canceled races
    // Bahrain GP and Saudi Arabian GP in April 2026 were canceled
    var races = meetings
      .filter(function(m) {
        if (/test/i.test(m.meeting_name || '')) return false;
        var name = (m.meeting_name || '').toLowerCase();
        var d = new Date(m.date_start);
        if ((name.indexOf('bahrain') >= 0 || name.indexOf('saudi') >= 0) && d.getUTCFullYear() === 2026 && d.getUTCMonth() === 3) return false;
        return true;
      })
      .sort(function(a, b) { return new Date(a.date_start) - new Date(b.date_start); });

    // Group sessions by meeting_key
    var sessionMap = {};
    sessions.forEach(function(s) {
      if (!sessionMap[s.meeting_key]) sessionMap[s.meeting_key] = [];
      sessionMap[s.meeting_key].push(s);
    });

    // Sort sessions within each meeting
    Object.values(sessionMap).forEach(function(arr) {
      arr.sort(function(a, b) { return new Date(a.date_start) - new Date(b.date_start); });
    });

    // Determine completed vs upcoming
    var completed = [];
    var upcoming = [];

    races.forEach(function(race) {
      var raceSessions = sessionMap[race.meeting_key] || [];
      var raceEnd;
      if (raceSessions.length > 0) {
        var lastSession = raceSessions[raceSessions.length - 1];
        raceEnd = new Date(lastSession.date_end || lastSession.date_start);
      } else {
        raceEnd = new Date(new Date(race.date_start).getTime() + 3 * 86400000);
      }

      if (raceEnd < now) {
        completed.push(race);
      } else {
        upcoming.push(race);
      }
    });

    var totalRaces = races.length;
    var completedCount = completed.length;

    // Previous race (last completed)
    var prevRace = completed.length > 0 ? completed[completed.length - 1] : null;

    // Next race (first upcoming)
    var nextRace = upcoming[0] || null;

    // Race after next
    var afterNextRace = upcoming.length > 1 ? upcoming[1] : null;

    // Round map
    var roundMap = {};
    races.forEach(function(r, i) { roundMap[r.meeting_key] = i + 1; });

    var app = document.getElementById('app');
    var html = '';

    // Header
    html += '<div class="header">';
    html += '<div class="header-left">';
    html += '<span class="header-title">F1 2026</span>';
    html += '<span class="header-subtitle">RACE CALENDAR</span>';
    html += '</div>';
    html += '</div>';

    // Previous Race Strip
    if (prevRace) {
      var prevSessions = sessionMap[prevRace.meeting_key] || [];
      var prevDateStr = formatDate(prevRace.date_start);
      if (prevSessions.length > 1) {
        prevDateStr = formatDateRange(prevSessions[0].date_start, prevSessions[prevSessions.length - 1].date_start);
      }
      html += '<div class="prev-race-strip">';
      html += '<div><span class="prev-label">PREVIOUS</span><span class="prev-name">' + escapeHtml((prevRace.meeting_name || '').replace('Grand Prix', 'GP')) + '</span></div>';
      html += '<span class="prev-right">' + prevDateStr + '</span>';
      html += '</div>';
    }

    // Next Race Hero
    if (nextRace) {
      var round = roundMap[nextRace.meeting_key];
      var raceSessions = sessionMap[nextRace.meeting_key] || [];
      var heroDateRange = formatDate(nextRace.date_start);
      if (raceSessions.length > 1) {
        heroDateRange = formatDateRangeUpper(raceSessions[0].date_start, raceSessions[raceSessions.length - 1].date_start);
      } else {
        heroDateRange = months[new Date(nextRace.date_start).getUTCMonth()].toUpperCase() + ' ' + new Date(nextRace.date_start).getUTCDate();
      }

      var locParts = [];
      if (nextRace.location) locParts.push(escapeHtml(nextRace.location));
      if (nextRace.country_name) locParts.push(escapeHtml(nextRace.country_name));
      if (nextRace.circuit_short_name) locParts.push(escapeHtml(nextRace.circuit_short_name));
      var locStr = locParts.join(' \u00b7 ');

      // Find next upcoming session
      var nextSession = raceSessions.find(function(s) { return new Date(s.date_start) > now; }) || null;

      // Session labels
      var sessionLabels = {'Practice 1':'FP1','Practice 2':'FP2','Practice 3':'FP3','Qualifying':'QUAL','Sprint Qualifying':'SQ','Sprint':'SPRINT','Race':'RACE'};

      html += '<div class="hero">';

      // UP NEXT pill
      html += '<span class="hero-upnext">UP NEXT</span>';

      // Round + date range
      html += '<div class="hero-round">ROUND ' + round + ' OF ' + totalRaces + ' \u00b7 ' + heroDateRange + '</div>';

      // Race name - the headline
      html += '<div class="hero-race-name">' + escapeHtml(nextRace.meeting_name || '') + '</div>';

      // Location line
      html += '<div class="hero-location"><i class="fa-solid fa-location-dot"></i>' + locStr + '</div>';

      // Track map - the visual anchor
      if (nextRace.circuit_image) {
        html += '<img class="hero-track-img" src="' + escapeHtml(nextRace.circuit_image) + '" alt="" onerror="this.style.display=\'none\'">';
      }

      // Today / session info row
      if (nextSession) {
        var diff = new Date(nextSession.date_start) - now;
        if (diff > 0) {
          var totalDays = Math.floor(diff / 86400000);
          var sessionLabel = sessionLabels[nextSession.session_name] || nextSession.session_name;

          var when;
          if (totalDays === 0) when = 'Today';
          else if (totalDays === 1) when = 'Tomorrow';
          else if (totalDays < 7) when = 'In ' + totalDays + ' days';
          else when = 'In ' + Math.ceil(totalDays / 7) + ' weeks';

          var sessDate = new Date(nextSession.date_start);
          var sessDay = sessDate.toLocaleString('en-US', {timeZone:'America/Los_Angeles', weekday:'long'});
          var sessTime = sessDate.toLocaleString('en-US', {timeZone:'America/Los_Angeles', hour:'numeric', minute:'2-digit', hour12:true});

          html += '<div class="hero-today-row">';
          html += '<span class="hero-today-when">' + when + '</span>';
          html += '<span class="hero-today-session">' + sessionLabel + ' \u00b7 ' + sessDay + ' ' + sessTime + ' PDT</span>';
          html += '</div>';
        }
      }

      // Session pills
      var displaySessions = raceSessions.filter(function(s) {
        var n = s.session_name || '';
        return ['Practice 1','Practice 2','Practice 3','Qualifying','Sprint Qualifying','Sprint','Race'].indexOf(n) >= 0;
      });
      if (displaySessions.length) {
        html += '<div class="session-pills">';
        displaySessions.forEach(function(s) {
          var d = new Date(s.date_start);
          var dayStr = d.toLocaleString('en-US', {timeZone:'America/Los_Angeles', weekday:'short'});
          var timeStr = d.toLocaleString('en-US', {timeZone:'America/Los_Angeles', hour:'numeric', minute:'2-digit', hour12:true});
          var label = sessionLabels[s.session_name] || s.session_name;
          var isNext = nextSession && s.session_key === nextSession.session_key;
          var isRace = s.session_name === 'Race';
          var cls = 's-pill' + (isNext ? ' is-next' : '') + (isRace ? ' is-race' : '');
          html += '<div class="' + cls + '">';
          html += '<span class="s-label">' + label + '</span>';
          html += '<span class="s-time">' + dayStr + ' ' + timeStr + '</span>';
          html += '</div>';
        });
        html += '</div>';
      }

      html += '</div>'; // hero
    }

    // Race After Next Strip
    if (afterNextRace) {
      var afterSessions = sessionMap[afterNextRace.meeting_key] || [];
      var afterDateStr = formatDate(afterNextRace.date_start);
      if (afterSessions.length > 1) {
        afterDateStr = formatDateRange(afterSessions[0].date_start, afterSessions[afterSessions.length - 1].date_start);
      }
      html += '<div class="after-race-strip">';
      html += '<div><span class="after-label">UP AFTER</span><span class="after-name">' + escapeHtml((afterNextRace.meeting_name || '').replace('Grand Prix', 'GP')) + '</span></div>';
      html += '<span class="after-right">' + afterDateStr + '</span>';
      html += '</div>';
    }

    app.innerHTML = html;

    // Set data-loaded after all images have loaded
    var images = app.querySelectorAll('img');
    if (images.length === 0) {
      document.body.setAttribute('data-loaded', 'true');
    } else {
      var loaded = 0;
      var total = images.length;
      function checkDone() {
        loaded++;
        if (loaded >= total) {
          document.body.setAttribute('data-loaded', 'true');
        }
      }
      images.forEach(function(img) {
        if (img.complete) {
          checkDone();
        } else {
          img.addEventListener('load', checkDone);
          img.addEventListener('error', checkDone);
        }
      });
    }
  }

  function renderError(msg) {
    var app = document.getElementById('app');
    app.innerHTML = '<div class="error-state">' + escapeHtml(msg) + '</div>';
    document.body.setAttribute('data-loaded', 'true');
    document.body.setAttribute('data-status', 'error');
  }

  try {
    var results = await Promise.all([
      fetchJSON('https://api.openf1.org/v1/meetings?year=' + YEAR),
      fetchJSON('https://api.openf1.org/v1/sessions?year=' + YEAR)
    ]);
    var meetings = results[0];
    var sessions = results[1];

    if (!Array.isArray(meetings) || meetings.length === 0) {
      renderError('No race data available for ' + YEAR + '.\nThe schedule may not yet be published.');
      return;
    }

    render(meetings, Array.isArray(sessions) ? sessions : []);
  } catch (err) {
    renderError('Unable to load race data.\n' + (err.message || 'Network error'));
  }
})();
</script>
</body>
</html>
