<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=768">
<title>F1 2026 Race Calendar</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&family=Playfair+Display:wght@400;700;900&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  margin: 0;
  width: 768px;
  height: 1024px;
  overflow: hidden;
  background: #e8e6e1;
  color: #000;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.4;
}

.container {
  width: 768px;
  height: 1024px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  background: #fff;
  border-radius: 12px;
  border: 1px solid #d0cec9;
  box-sizing: border-box;
  position: relative;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4px;
  margin-bottom: 12px;
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.header-title {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 36px;
  letter-spacing: -1px;
  line-height: 1;
  color: #000;
}

.header-subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #666;
  margin-top: 4px;
}

.progress-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: #000;
  border: 1.5px solid #000;
  border-radius: 12px;
  padding: 2px 10px;
  white-space: nowrap;
}

/* Next Race Hero ~190px */
.next-race {
  background: #f4f3f0;
  border: 1px solid #d0cec9;
  border-radius: 8px;
  padding: 14px 18px;
  margin: 0 12px 10px;
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
  gap: 16px;
  min-height: 170px;
}

.next-race-left {
  flex: 1;
  min-width: 0;
}

.next-race-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.next-race-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #666;
}

.round-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: #555;
  border: 1px solid #999;
  border-radius: 10px;
  padding: 1px 8px;
  white-space: nowrap;
}

.next-race-name {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 24px;
  line-height: 1.15;
  color: #000;
  margin-bottom: 6px;
}

.next-race-location {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: #555;
}

.sessions-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 12px;
  margin-top: 8px;
}

.session-item {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 400;
  color: #555;
  white-space: nowrap;
}

.session-item .s-name {
  font-weight: 500;
  color: #333;
}

.session-item.is-next {
  font-weight: 600;
  color: #000;
}

.session-item.is-next .s-name {
  color: #000;
}

.next-race-right {
  flex-shrink: 0;
  text-align: right;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: flex-end;
}

.next-race-dates {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  color: #333;
}

.countdown {
  display: flex;
  gap: 14px;
  margin-top: 6px;
}

.cd-unit {
  text-align: center;
}

.cd-num {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 32px;
  line-height: 1;
  color: #000;
}

.cd-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #999;
  margin-top: 2px;
}

/* Snake Timeline */
.snake-section {
  flex: 1;
  overflow: hidden;
  padding: 4px 8px 0;
  position: relative;
}

.snake-grid {
  position: relative;
  width: 100%;
  height: 100%;
}

.snake-chevron {
  position: absolute;
  z-index: 2;
  color: #000;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.snake-tile {
  width: 210px;
  height: 60px;
  background: #fff;
  border: 1px solid #d0cec9;
  border-radius: 6px;
  position: absolute;
  padding: 6px 10px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  z-index: 1;
}

.snake-tile.is-completed {
  opacity: 0.45;
}

.snake-tile.is-next-upcoming {
  border: 2px solid #000;
}

.tile-round {
  position: absolute;
  top: 4px;
  left: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 400;
  color: #999;
  line-height: 1;
}

.tile-name {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: #000;
  line-height: 1.15;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}

.tile-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 400;
  color: #666;
  text-align: center;
  line-height: 1;
  margin-top: 2px;
}

.sprint-badge {
  position: absolute;
  top: 4px;
  right: 5px;
  width: 14px;
  height: 14px;
  background: #000;
  color: #fff;
  border-radius: 50%;
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

/* Loading / Error */
.loading-state {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #999;
  letter-spacing: 1px;
}

.error-state {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #555;
  text-align: center;
  line-height: 1.6;
}

.timestamp {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  color: #bbb;
  position: absolute;
  bottom: 8px;
  right: 16px;
}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading-state" id="loading">LOADING RACE DATA</div>
</div>
<span class="timestamp" id="timestamp"></span>

<script>
(async function() {
  document.getElementById('timestamp').textContent = (function() {
    var d = new Date();
    return d.getUTCFullYear() + '-' + String(d.getUTCMonth()+1).padStart(2,'0') + '-' +
      String(d.getUTCDate()).padStart(2,'0') + ' ' + String(d.getUTCHours()).padStart(2,'0') + ':' +
      String(d.getUTCMinutes()).padStart(2,'0') + ' UTC';
  })();

  var YEAR = 2026;
  var now = new Date();

  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function formatDate(dateStr) {
    var d = new Date(dateStr);
    return months[d.getUTCMonth()] + ' ' + d.getUTCDate();
  }

  function formatDateRange(startStr, endStr) {
    var s = new Date(startStr);
    var e = new Date(endStr);
    var sMonth = months[s.getUTCMonth()];
    var eMonth = months[e.getUTCMonth()];
    var sDay = s.getUTCDate();
    var eDay = e.getUTCDate();
    if (sMonth === eMonth) {
      return sMonth + ' ' + sDay + '\u2013' + eDay;
    }
    return sMonth + ' ' + sDay + '\u2013' + eMonth + ' ' + eDay;
  }

  function formatCompactDateRange(startStr, endStr) {
    var s = new Date(startStr);
    var e = new Date(endStr);
    var sMonth = months[s.getUTCMonth()];
    var eMonth = months[e.getUTCMonth()];
    var sDay = s.getUTCDate();
    var eDay = e.getUTCDate();
    if (sMonth === eMonth) {
      return sMonth + ' ' + sDay + '\u2013' + eDay;
    }
    return sMonth + ' ' + sDay + '\u2013' + eMonth + ' ' + eDay;
  }

  async function fetchJSON(url) {
    var resp = await fetch(url);
    if (!resp.ok) throw new Error('API returned ' + resp.status);
    return resp.json();
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function isSprint(sessions) {
    return sessions.some(function(s) {
      var name = (s.session_name || '').toLowerCase();
      return name === 'sprint' || name === 'sprint qualifying';
    });
  }

  function render(meetings, sessions) {
    // Filter out testing meetings
    var races = meetings
      .filter(function(m) { return !(/test/i.test(m.meeting_name || '')); })
      .sort(function(a, b) { return new Date(a.date_start) - new Date(b.date_start); });

    // Group sessions by meeting_key
    var sessionMap = {};
    sessions.forEach(function(s) {
      if (!sessionMap[s.meeting_key]) sessionMap[s.meeting_key] = [];
      sessionMap[s.meeting_key].push(s);
    });

    // Sort sessions within each meeting
    Object.values(sessionMap).forEach(function(arr) {
      arr.sort(function(a, b) { return new Date(a.date_start) - new Date(b.date_start); });
    });

    // Determine completed vs upcoming
    var completed = [];
    var upcoming = [];

    races.forEach(function(race) {
      var raceSessions = sessionMap[race.meeting_key] || [];
      var raceEnd;
      if (raceSessions.length > 0) {
        var lastSession = raceSessions[raceSessions.length - 1];
        raceEnd = new Date(lastSession.date_end || lastSession.date_start);
      } else {
        raceEnd = new Date(new Date(race.date_start).getTime() + 3 * 86400000);
      }

      if (raceEnd < now) {
        completed.push(race);
      } else {
        upcoming.push(race);
      }
    });

    var totalRaces = races.length;
    var completedCount = completed.length;

    // Next race
    var nextRace = upcoming[0] || null;

    // Round map
    var roundMap = {};
    races.forEach(function(r, i) { roundMap[r.meeting_key] = i + 1; });

    // Build all races for snake grid
    var allForSnake = races;

    // Determine the next-race key for highlight in the snake
    var nextRaceKey = nextRace ? nextRace.meeting_key : null;

    var app = document.getElementById('app');
    var html = '';

    // Header
    html += '<div class="header">';
    html += '<div class="header-left">';
    html += '<span class="header-title">F1 2026</span>';
    html += '<span class="header-subtitle">RACE CALENDAR</span>';
    html += '</div>';
    html += '<div class="progress-pill">' + completedCount + '/' + totalRaces + '</div>';
    html += '</div>';

    // Next Race Hero Card
    if (nextRace) {
      var round = roundMap[nextRace.meeting_key];
      var raceSessions = sessionMap[nextRace.meeting_key] || [];
      var dateRange = formatDate(nextRace.date_start);
      if (raceSessions.length > 1) {
        var first = raceSessions[0];
        var last = raceSessions[raceSessions.length - 1];
        dateRange = formatDateRange(first.date_start, last.date_start);
      }

      var loc = escapeHtml(nextRace.location || '');
      if (nextRace.country_name) loc += ', ' + escapeHtml(nextRace.country_name);

      // Find next upcoming session
      var nextSession = raceSessions.find(function(s) { return new Date(s.date_start) > now; }) || null;

      html += '<div class="next-race">';
      html += '<div class="next-race-left">';
      html += '<div class="next-race-top">';
      html += '<i class="fa-solid fa-flag-checkered" style="font-size:11px;color:#666"></i>';
      html += '<span class="next-race-label">NEXT RACE</span>';
      html += '<span class="round-pill">ROUND ' + round + '</span>';
      html += '</div>';
      html += '<div class="next-race-name">' + escapeHtml(nextRace.meeting_name) + '</div>';
      html += '<div class="next-race-location"><i class="fa-solid fa-location-dot" style="font-size:12px;color:#666;margin-right:4px"></i>' + loc + '</div>';

      // Session schedule in Seattle time
      var displaySessions = raceSessions.filter(function(s) {
        var n = s.session_name || '';
        return ['Practice 1','Practice 2','Practice 3','Qualifying','Sprint Qualifying','Sprint','Race'].indexOf(n) >= 0;
      });
      if (displaySessions.length) {
        var sessionLabels = {'Practice 1':'FP1','Practice 2':'FP2','Practice 3':'FP3','Qualifying':'QUAL','Sprint Qualifying':'SQ','Sprint':'SPRINT','Race':'RACE'};
        html += '<div class="sessions-list">';
        displaySessions.forEach(function(s) {
          var d = new Date(s.date_start);
          var seattleStr = d.toLocaleString('en-US', {timeZone:'America/Los_Angeles', weekday:'short', hour:'numeric', minute:'2-digit', hour12:true});
          var label = sessionLabels[s.session_name] || s.session_name;
          var isNext = nextSession && s.session_key === nextSession.session_key;
          html += '<span class="session-item' + (isNext ? ' is-next' : '') + '">';
          html += '<span class="s-name">' + label + '</span> ' + seattleStr;
          html += '</span>';
        });
        html += '</div>';
      }
      html += '</div>';

      html += '<div class="next-race-right">';
      html += '<div class="next-race-dates">' + dateRange + '</div>';
      if (nextSession) {
        var diff = new Date(nextSession.date_start) - now;
        if (diff > 0) {
          var totalHrs = Math.floor(diff / 3600000);
          var days = Math.floor(totalHrs / 24);
          var hrs = totalHrs % 24;
          html += '<div class="countdown">';
          html += '<div class="cd-unit"><div class="cd-num">' + days + '</div><div class="cd-label">DAYS</div></div>';
          html += '<div class="cd-unit"><div class="cd-num">' + hrs + '</div><div class="cd-label">HRS</div></div>';
          html += '</div>';
        }
      }
      html += '</div>';
      html += '</div>';
    }

    // Snaking Timeline with D3 path
    var cols = 3;
    var tileW = 210, tileH = 60, gapX = 14, gapY = 18;
    var gridWidth = cols * tileW + (cols - 1) * gapX;
    var totalRows = Math.ceil(allForSnake.length / cols);
    var gridHeight = totalRows * tileH + (totalRows - 1) * gapY;
    var gridPadLeft = Math.floor((736 - 16 - gridWidth) / 2); // center within snake-section

    html += '<div class="snake-section">';
    html += '<div class="snake-grid" id="snake-grid">';


    // Render tiles with absolute positioning
    allForSnake.forEach(function(race, i) {
      var row = Math.floor(i / cols);
      var colInRow = i % cols;
      var isReversed = row % 2 === 1;
      var col = isReversed ? (cols - 1 - colInRow) : colInRow;

      var x = gridPadLeft + col * (tileW + gapX);
      var y = row * (tileH + gapY);

      var rnd = roundMap[race.meeting_key];
      var raceSess = sessionMap[race.meeting_key] || [];
      var sprintWeekend = isSprint(raceSess);

      // Determine date range for tile
      var tileDate = formatDate(race.date_start);
      if (raceSess.length > 1) {
        var lastS = raceSess[raceSess.length - 1];
        tileDate = formatCompactDateRange(raceSess[0].date_start, lastS.date_start);
      }

      // Is completed?
      var raceEnd;
      if (raceSess.length > 0) {
        var lastSess = raceSess[raceSess.length - 1];
        raceEnd = new Date(lastSess.date_end || lastSess.date_start);
      } else {
        raceEnd = new Date(new Date(race.date_start).getTime() + 3 * 86400000);
      }
      var isCompleted = raceEnd < now;
      var isNextUpcoming = race.meeting_key === nextRaceKey;

      var tileClass = 'snake-tile';
      if (isCompleted) tileClass += ' is-completed';
      if (isNextUpcoming) tileClass += ' is-next-upcoming';

      var tileName = escapeHtml((race.meeting_name || '').replace('Grand Prix', 'GP'));

      html += '<div class="' + tileClass + '" style="left:' + x + 'px;top:' + y + 'px;">';
      html += '<span class="tile-round">' + String(rnd).padStart(2, '0') + '</span>';
      if (sprintWeekend) {
        html += '<span class="sprint-badge">S</span>';
      }
      html += '<div class="tile-name">' + tileName + '</div>';
      html += '<div class="tile-date">' + tileDate + '</div>';
      html += '</div>';

      // Add chevrons between tiles
      if (i < allForSnake.length - 1) {
        var nextI = i + 1;
        var nextRow = Math.floor(nextI / cols);
        var nextColInRow = nextI % cols;
        var nextIsRev = nextRow % 2 === 1;
        var nextCol = nextIsRev ? (cols - 1 - nextColInRow) : nextColInRow;

        if (nextRow === row) {
          // Same row: horizontal chevron in the gap
          var chevX, chevIcon;
          if (!isReversed) {
            chevX = gridPadLeft + col * (tileW + gapX) + tileW; // right edge of current tile
            chevIcon = 'fa-chevron-right';
          } else {
            chevX = gridPadLeft + col * (tileW + gapX) - gapX; // left edge gap
            chevIcon = 'fa-chevron-left';
          }
          var chevY = y + tileH / 2;
          html += '<div class="snake-chevron" style="left:' + chevX + 'px;top:' + (chevY - 9) + 'px;width:' + gapX + 'px;height:18px;">';
          html += '<i class="fa-solid ' + chevIcon + '"></i></div>';
        } else {
          // Row turn: down chevron at the edge
          var turnX;
          if (!isReversed) {
            turnX = gridPadLeft + col * (tileW + gapX) + tileW / 2; // center of last tile
          } else {
            turnX = gridPadLeft + col * (tileW + gapX) + tileW / 2;
          }
          var turnY = y + tileH;
          html += '<div class="snake-chevron" style="left:' + (turnX - 9) + 'px;top:' + turnY + 'px;width:18px;height:' + gapY + 'px;">';
          html += '<i class="fa-solid fa-chevron-down"></i></div>';
        }
      }
    });

    html += '</div>'; // snake-grid
    html += '</div>'; // snake-section

    app.innerHTML = html;

    document.body.setAttribute('data-loaded', 'true');
  }


  function renderError(msg) {
    var app = document.getElementById('app');
    app.innerHTML = '<div class="error-state">' + escapeHtml(msg) + '</div>';
    document.body.setAttribute('data-loaded', 'true');
  }

  try {
    var results = await Promise.all([
      fetchJSON('https://api.openf1.org/v1/meetings?year=' + YEAR),
      fetchJSON('https://api.openf1.org/v1/sessions?year=' + YEAR)
    ]);
    var meetings = results[0];
    var sessions = results[1];

    if (!Array.isArray(meetings) || meetings.length === 0) {
      renderError('No race data available for ' + YEAR + '.\nThe schedule may not yet be published.');
      return;
    }

    render(meetings, sessions || []);
  } catch (err) {
    renderError('Unable to load race data.\n' + (err.message || 'Network error'));
  }
})();
</script>
</body>
</html>
