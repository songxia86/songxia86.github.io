<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=768">
<title>F1 2026 Race Calendar</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500;700&family=Playfair+Display:wght@400;700;900&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  margin: 0;
  width: 768px;
  height: 1024px;
  overflow: hidden;
  background: #e8e6e1;
  color: #333;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.4;
}

.container {
  width: 100%;
  height: 100%;
  padding: 16px;
  display: flex;
  flex-direction: column;
  background: #fff;
  border-radius: 12px;
  border: 1px solid #d0cec9;
}

/* Header ~55px */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px 8px;
  flex-shrink: 0;
  height: 55px;
}

.header-left {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.header-title {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 32px;
  line-height: 1;
  color: #000;
}

.header-subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #666;
}

.progress-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: #000;
  border: 1.5px solid #000;
  border-radius: 12px;
  padding: 2px 10px;
  white-space: nowrap;
}

/* Next Race Hero ~130px */
.next-race {
  background: #f4f3f0;
  border: 1px solid #d0cec9;
  border-radius: 8px;
  padding: 14px 18px;
  margin: 0 12px 10px;
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
  gap: 16px;
}

.next-race-left {
  flex: 1;
  min-width: 0;
}

.next-race-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.next-race-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #666;
}

.round-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: #555;
  border: 1px solid #999;
  border-radius: 10px;
  padding: 1px 8px;
  white-space: nowrap;
}

.next-race-name {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 24px;
  line-height: 1.15;
  color: #000;
  margin-bottom: 6px;
}

.next-race-location {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: #555;
}

.next-race-right {
  flex-shrink: 0;
  text-align: right;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: flex-end;
}

.next-race-dates {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  color: #333;
}

.countdown {
  display: flex;
  gap: 14px;
  margin-top: 6px;
}

.cd-unit {
  text-align: center;
}

.cd-num {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 32px;
  line-height: 1;
  color: #000;
}

.cd-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #999;
  margin-top: 2px;
}

/* Upcoming Races */
.upcoming-section {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: 0 12px;
}

.upcoming-row {
  display: flex;
  align-items: center;
  height: 38px;
  border-bottom: 1px solid #e8e6e1;
}

.upcoming-row:last-child {
  border-bottom: none;
}

.row-round {
  width: 42px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 400;
  color: #999;
  flex-shrink: 0;
}

.row-name {
  flex: 1;
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 16px;
  color: #000;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sprint-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #666;
  border: 1px solid #666;
  border-radius: 8px;
  padding: 1px 6px;
  white-space: nowrap;
  flex-shrink: 0;
}

.row-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 400;
  color: #555;
  text-align: right;
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: 12px;
}

.more-races {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 300;
  color: #999;
  text-align: center;
  padding: 6px 0;
  flex-shrink: 0;
}

/* Footer ~35px */
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: #f4f3f0;
  border-radius: 0 0 8px 8px;
  margin: auto -16px -16px;
  flex-shrink: 0;
  height: 35px;
}

.footer-left,
.footer-right {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 300;
  color: #999;
}

/* Loading / Error */
.loading-state {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #999;
  letter-spacing: 1px;
}

.error-state {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #555;
  text-align: center;
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading-state" id="loading">LOADING RACE DATA</div>
</div>

<script>
(async function() {
  const YEAR = 2026;
  const now = new Date();

  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    return months[d.getUTCMonth()] + ' ' + d.getUTCDate();
  }

  function formatDateRange(startStr, endStr) {
    const s = new Date(startStr);
    const e = new Date(endStr);
    const sMonth = months[s.getUTCMonth()];
    const eMonth = months[e.getUTCMonth()];
    const sDay = s.getUTCDate();
    const eDay = e.getUTCDate();
    if (sMonth === eMonth) {
      return sMonth + ' ' + sDay + ' \u2013 ' + eDay;
    }
    return sMonth + ' ' + sDay + ' \u2013 ' + eMonth + ' ' + eDay;
  }

  function formatTimestamp() {
    const d = new Date();
    const y = d.getUTCFullYear();
    const mo = String(d.getUTCMonth() + 1).padStart(2, '0');
    const da = String(d.getUTCDate()).padStart(2, '0');
    const h = String(d.getUTCHours()).padStart(2, '0');
    const mi = String(d.getUTCMinutes()).padStart(2, '0');
    return y + '-' + mo + '-' + da + ' ' + h + ':' + mi + ' UTC';
  }

  async function fetchJSON(url) {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('API returned ' + resp.status);
    return resp.json();
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function isSprint(sessions) {
    return sessions.some(function(s) {
      var name = (s.session_name || '').toLowerCase();
      return name === 'sprint' || name === 'sprint qualifying';
    });
  }

  function render(meetings, sessions) {
    // Filter out testing meetings
    var races = meetings
      .filter(function(m) { return !(/test/i.test(m.meeting_name || '')); })
      .sort(function(a, b) { return new Date(a.date_start) - new Date(b.date_start); });

    // Group sessions by meeting_key
    var sessionMap = {};
    sessions.forEach(function(s) {
      if (!sessionMap[s.meeting_key]) sessionMap[s.meeting_key] = [];
      sessionMap[s.meeting_key].push(s);
    });

    // Sort sessions within each meeting
    Object.values(sessionMap).forEach(function(arr) {
      arr.sort(function(a, b) { return new Date(a.date_start) - new Date(b.date_start); });
    });

    // Determine completed vs upcoming
    var completed = [];
    var upcoming = [];

    races.forEach(function(race) {
      var raceSessions = sessionMap[race.meeting_key] || [];
      var raceEnd;
      if (raceSessions.length > 0) {
        var lastSession = raceSessions[raceSessions.length - 1];
        raceEnd = new Date(lastSession.date_end || lastSession.date_start);
      } else {
        raceEnd = new Date(new Date(race.date_start).getTime() + 3 * 86400000);
      }

      if (raceEnd < now) {
        completed.push(race);
      } else {
        upcoming.push(race);
      }
    });

    var totalRaces = races.length;
    var completedCount = completed.length;

    // Next race
    var nextRace = upcoming[0] || null;
    var futureRaces = upcoming.slice(1);

    // Round map
    var roundMap = {};
    races.forEach(function(r, i) { roundMap[r.meeting_key] = i + 1; });

    var app = document.getElementById('app');
    var maxRows = 24;
    var visibleFuture = futureRaces.slice(0, maxRows);
    var remainingCount = futureRaces.length - visibleFuture.length;

    var html = '';

    // Header
    html += '<div class="header">';
    html += '<div class="header-left">';
    html += '<span class="header-title">F1 2026</span>';
    html += '<span class="header-subtitle">RACE CALENDAR</span>';
    html += '</div>';
    html += '<div class="progress-pill">' + completedCount + '/' + totalRaces + '</div>';
    html += '</div>';

    // Next Race Hero
    if (nextRace) {
      var round = roundMap[nextRace.meeting_key];
      var raceSessions = sessionMap[nextRace.meeting_key] || [];
      var dateRange = formatDate(nextRace.date_start);
      if (raceSessions.length > 1) {
        var first = raceSessions[0];
        var last = raceSessions[raceSessions.length - 1];
        dateRange = formatDateRange(first.date_start, last.date_start);
      }

      var loc = escapeHtml(nextRace.location || '');
      if (nextRace.country_name) loc += ', ' + escapeHtml(nextRace.country_name);

      // Countdown to next session
      var nextSession = raceSessions.find(function(s) { return new Date(s.date_start) > now; }) || null;

      html += '<div class="next-race">';
      html += '<div class="next-race-left">';
      html += '<div class="next-race-top">';
      html += '<i class="fa-solid fa-flag-checkered" style="font-size:11px;color:#666"></i>';
      html += '<span class="next-race-label">NEXT RACE</span>';
      html += '<span class="round-pill">ROUND ' + round + '</span>';
      html += '</div>';
      html += '<div class="next-race-name">' + escapeHtml(nextRace.meeting_name) + '</div>';
      html += '<div class="next-race-location"><i class="fa-solid fa-location-dot" style="font-size:12px;color:#666;margin-right:4px"></i>' + loc + '</div>';
      html += '</div>';

      html += '<div class="next-race-right">';
      html += '<div class="next-race-dates">' + dateRange + '</div>';
      if (nextSession) {
        var diff = new Date(nextSession.date_start) - now;
        if (diff > 0) {
          var totalHrs = Math.floor(diff / 3600000);
          var days = Math.floor(totalHrs / 24);
          var hrs = totalHrs % 24;
          html += '<div class="countdown">';
          html += '<div class="cd-unit"><div class="cd-num">' + days + '</div><div class="cd-label">DAYS</div></div>';
          html += '<div class="cd-unit"><div class="cd-num">' + hrs + '</div><div class="cd-label">HRS</div></div>';
          html += '</div>';
        }
      }
      html += '</div>';
      html += '</div>';
    }

    // Upcoming Races
    if (visibleFuture.length > 0) {
      html += '<div class="upcoming-section">';

      visibleFuture.forEach(function(race) {
        var round = roundMap[race.meeting_key];
        var raceSessions = sessionMap[race.meeting_key] || [];
        var dateRange = formatDate(race.date_start);
        if (raceSessions.length > 1) {
          var last = raceSessions[raceSessions.length - 1];
          dateRange = formatDateRange(race.date_start, last.date_start);
        }
        var sprintWeekend = isSprint(raceSessions);

        html += '<div class="upcoming-row">';
        html += '<div class="row-round">' + String(round).padStart(2, '0') + '</div>';
        html += '<div class="row-name">';
        html += '<span>' + escapeHtml(race.meeting_name) + '</span>';
        if (sprintWeekend) {
          html += '<span class="sprint-pill">SPRINT</span>';
        }
        html += '</div>';
        html += '<div class="row-date">' + dateRange + '</div>';
        html += '</div>';
      });

      if (remainingCount > 0) {
        html += '<div class="more-races">\u2026 and ' + remainingCount + ' more</div>';
      }

      html += '</div>';
    }

    // Footer
    html += '<div class="footer">';
    html += '<div class="footer-left">openf1.org \u00b7 ' + YEAR + '</div>';
    html += '<div class="footer-right">' + formatTimestamp() + '</div>';
    html += '</div>';

    app.innerHTML = html;
    document.body.setAttribute('data-loaded', 'true');
  }

  function renderError(msg) {
    var app = document.getElementById('app');
    app.innerHTML = '<div class="error-state">' + escapeHtml(msg) + '</div>' +
      '<div class="footer"><div class="footer-left">openf1.org \u00b7 ' + YEAR + '</div>' +
      '<div class="footer-right">' + formatTimestamp() + '</div></div>';
    document.body.setAttribute('data-loaded', 'true');
  }

  try {
    var results = await Promise.all([
      fetchJSON('https://api.openf1.org/v1/meetings?year=' + YEAR),
      fetchJSON('https://api.openf1.org/v1/sessions?year=' + YEAR)
    ]);
    var meetings = results[0];
    var sessions = results[1];

    if (!Array.isArray(meetings) || meetings.length === 0) {
      renderError('No race data available for ' + YEAR + '.\nThe schedule may not yet be published.');
      return;
    }

    render(meetings, sessions || []);
  } catch (err) {
    renderError('Unable to load race data.\n' + (err.message || 'Network error'));
  }
})();
</script>
</body>
</html>
