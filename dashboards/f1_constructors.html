<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=768">
<title>F1 2026 Constructors Championship</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&family=Playfair+Display:wght@400;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: none; -moz-osx-font-smoothing: unset; }

body {
  margin: 0; width: 768px; height: 1024px; overflow: hidden;
  background: #fff; color: #000;
  font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.4;
}

.page {
  width: 768px; height: 1024px;
  padding: 32px 36px 20px; display: flex; flex-direction: column;
}

.header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 4px; }
.header-f1 { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 48px; letter-spacing: -1px; line-height: 1; }
.header-year { font-family: 'Playfair Display', serif; font-weight: 400; font-size: 48px; letter-spacing: -1px; line-height: 1; color: #444; }
.header-subtitle { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 3.5px; text-transform: uppercase; color: #444; margin-bottom: 10px; }
.header-rule { border: none; border-top: 1px solid #000; margin-bottom: 20px; }

table { width: 100%; border-collapse: collapse; table-layout: fixed; }
thead th {
  font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 400;
  letter-spacing: 2px; text-transform: uppercase; color: #888;
  padding-bottom: 10px; border-bottom: 1px solid #aaa;
}

.col-pos { width: 56px; }
.col-team { width: auto; }
.col-drivers { width: 260px; }
.col-pts { width: 80px; text-align: right; }

tbody td {
  padding: 16px 0; vertical-align: baseline;
  border-bottom: 1px solid #ddd;
}
tbody tr:last-child td { border-bottom: none; }

td.pos {
  font-family: 'Playfair Display', serif; font-weight: 700;
  font-size: 28px; color: #000;
}
tr.top-three td.pos { font-size: 34px; font-weight: 900; }

td.team {
  font-family: 'Inter', sans-serif; font-weight: 600;
  font-size: 18px; color: #000;
}

td.drivers {
  font-family: 'Inter', sans-serif; font-weight: 400;
  font-size: 13px; color: #666; line-height: 1.5;
}

td.pts {
  font-family: 'JetBrains Mono', monospace; font-weight: 700;
  font-size: 20px; text-align: right; color: #000; padding-right: 4px;
}
td.pts .pts-label {
  font-size: 10px; font-weight: 400; color: #888; margin-left: 2px;
}
th.col-pts { text-align: right; padding-right: 4px; }

.table-wrap { flex: 1; overflow: hidden; }

/* ── Points bar ── */
td.pts-bar-cell { padding: 0; vertical-align: middle; }
.pts-bar-wrap { position: relative; height: 4px; background: #eee; border-radius: 2px; margin-top: 6px; }
.pts-bar { height: 100%; background: #000; border-radius: 2px; }

.footer {
  margin-top: auto; padding-top: 8px; border-top: 1px solid #000;
  display: flex; justify-content: space-between; align-items: baseline;
}
.footer span {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  font-weight: 400; color: #888;
}

.error-msg { font-family: 'Inter', sans-serif; font-size: 14px; color: #888; padding: 24px 0; text-align: center; }
.loading-msg { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #888; padding: 32px 0; text-align: center; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <span class="header-f1">F1</span>
    <span class="header-year">2026</span>
  </div>
  <div class="header-subtitle">Constructors Championship</div>
  <hr class="header-rule">

  <div class="table-wrap" id="constructors-container">
    <div class="loading-msg">Loading standings...</div>
  </div>

  <div class="footer">
    <span>openf1.org &middot; 2026</span>
    <span id="timestamp"></span>
  </div>

</div>

<script>
(async function() {
  const API = 'https://api.openf1.org/v1';

  document.getElementById('timestamp').textContent = (function() {
    const d = new Date();
    return d.getUTCFullYear() + '-' + String(d.getUTCMonth()+1).padStart(2,'0') + '-' +
      String(d.getUTCDate()).padStart(2,'0') + ' ' + String(d.getUTCHours()).padStart(2,'0') + ':' +
      String(d.getUTCMinutes()).padStart(2,'0') + ' UTC';
  })();

  async function fetchJSON(url) {
    const r = await fetch(url); if (!r.ok) throw new Error('HTTP ' + r.status); return r.json();
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  try {
    const [driversRaw, champTeams, champDrivers] = await Promise.all([
      fetchJSON(API + '/drivers?session_key=latest').catch(() => []),
      fetchJSON(API + '/championship_teams?session_key=latest').catch(() => []),
      fetchJSON(API + '/championship_drivers?session_key=latest').catch(() => [])
    ]);

    // Map drivers by number
    const driverMap = {};
    (driversRaw || []).forEach(d => { if (d.driver_number != null) driverMap[d.driver_number] = d; });

    // Map drivers by team name
    const teamDrivers = {};
    Object.values(driverMap).forEach(d => {
      const t = d.team_name || 'Unknown';
      if (!teamDrivers[t]) teamDrivers[t] = [];
      teamDrivers[t].push(d);
    });

    const sorted = (champTeams || []).slice().sort((a, b) => {
      const pa = a.position_current || 999, pb = b.position_current || 999;
      return pa !== pb ? pa - pb : (b.points_current || 0) - (a.points_current || 0);
    });

    const maxPts = sorted.length > 0 ? Math.max(...sorted.map(t => t.points_current || 0), 1) : 1;

    if (!sorted.length) {
      document.getElementById('constructors-container').innerHTML = '<div class="error-msg">Data unavailable</div>';
    } else {
      let html = '<table><thead><tr>';
      html += '<th class="col-pos">Pos</th><th class="col-team">Team</th>';
      html += '<th class="col-drivers">Drivers</th>';
      html += '<th class="col-pts">Points</th>';
      html += '</tr></thead><tbody>';

      sorted.forEach((e, i) => {
        const pos = e.position_current || (i + 1);
        const team = e.team_name || 'Team #' + (i + 1);
        const pts = e.points_current != null ? e.points_current : 0;
        const cls = pos <= 3 ? ' class="top-three"' : '';
        const drivers = (teamDrivers[team] || []).map(d => d.full_name || d.name_acronym || '').filter(Boolean).join(', ');
        const barPct = maxPts > 0 ? Math.round((pts / maxPts) * 100) : 0;

        html += '<tr' + cls + '>';
        html += '<td class="pos">' + pos + '</td>';
        html += '<td class="team">' + esc(team) + '<div class="pts-bar-wrap"><div class="pts-bar" style="width:' + barPct + '%"></div></div></td>';
        html += '<td class="drivers">' + esc(drivers) + '</td>';
        html += '<td class="pts">' + pts + '<span class="pts-label">pts</span></td>';
        html += '</tr>';
      });

      html += '</tbody></table>';
      document.getElementById('constructors-container').innerHTML = html;
    }
  } catch (e) {
    document.getElementById('constructors-container').innerHTML = '<div class="error-msg">Data unavailable</div>';
  }

  document.body.setAttribute('data-loaded', 'true');
})();
</script>
</body>
</html>
