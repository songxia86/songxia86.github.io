<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=768">
<title>F1 2026 Constructors Championship</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&family=Playfair+Display:wght@400;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body { margin: 0; width: 768px; height: 1024px; overflow: hidden; background: #e8e6e1; color: #000; font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.4; }

.page { width: 768px; height: 1024px; padding: 20px; display: flex; flex-direction: column; background: #fff; border-radius: 12px; border: 1px solid #d0cec9; box-sizing: border-box; position: relative; overflow: hidden; }

/* Header */
.header { display: flex; flex-direction: column; padding: 0 4px; margin-bottom: 12px; }
.header-title { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 36px; letter-spacing: -1px; line-height: 1; color: #000; }
.header-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: #666; margin-top: 4px; }

/* Top 3 Row */
.top3-row { display: flex; gap: 10px; margin-bottom: 12px; }
.top3-card {
  flex: 1; height: 230px; background: #f4f3f0; border-radius: 8px; border: 1px solid #d0cec9;
  display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
  padding: 16px 18px; position: relative; overflow: hidden;
}
.top3-pos-badge {
  position: absolute; top: 50%; right: 4px; transform: translateY(-50%);
  font-family: 'Playfair Display', serif; font-size: 100px; font-weight: 900;
  color: #000; opacity: 0.15; line-height: 1; pointer-events: none;
}
.top3-line1 { font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 700; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 85%; }
.top3-line2 { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; color: #000; margin-top: 8px; }
.top3-line3 { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 400; color: #999; margin-top: 6px; }

/* P4-P11 Grid */
.grid-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  flex: 1; overflow: hidden;
}
.grid-card {
  height: 140px; display: flex; flex-direction: column; justify-content: center; padding: 12px 18px;
  background: #fff; border: 1px solid #e8e6e1; border-radius: 6px;
  position: relative; overflow: hidden;
}
.grid-watermark {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  font-family: 'Playfair Display', serif; font-size: 72px; font-weight: 900;
  color: #000; opacity: 0.12; line-height: 1; pointer-events: none;
}
.grid-line1 { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 700; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.grid-line2 { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 400; color: #666; margin-top: 6px; }

.error-msg { font-family: 'Inter', sans-serif; font-size: 16px; color: #999; padding: 24px 0; text-align: center; }
.loading-msg { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #999; padding: 32px 0; text-align: center; letter-spacing: 1px; }

.timestamp {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 400; color: #bbb;
  position: absolute; bottom: 8px; right: 16px;
}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <span class="header-title">F1 2026</span>
    <div class="header-sub">Constructors Championship</div>
  </div>

  <div id="content">
    <div class="loading-msg">Loading standings...</div>
  </div>

  <span class="timestamp" id="timestamp"></span>
</div>

<script>
(async function() {
  document.getElementById('timestamp').textContent = (function() {
    var d = new Date();
    return d.getUTCFullYear() + '-' + String(d.getUTCMonth()+1).padStart(2,'0') + '-' +
      String(d.getUTCDate()).padStart(2,'0') + ' ' + String(d.getUTCHours()).padStart(2,'0') + ':' +
      String(d.getUTCMinutes()).padStart(2,'0') + ' UTC';
  })();

  var API = 'https://api.openf1.org/v1';

  async function fetchJSON(url) {
    var maxRetries = 4;
    for (var attempt = 0; attempt < maxRetries; attempt++) {
      try {
        var resp = await fetch(url);
        if (resp.status === 429) {
          var wait = Math.pow(2, attempt) * 2000 + Math.random() * 1000;
          console.warn('Rate limited on ' + url + ', retry in ' + Math.round(wait) + 'ms');
          await new Promise(function(r) { setTimeout(r, wait); });
          continue;
        }
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return await resp.json();
      } catch (err) {
        if (attempt < maxRetries - 1) {
          var wait = Math.pow(2, attempt) * 1500 + Math.random() * 500;
          console.warn('Fetch error on ' + url + ': ' + err.message + ', retry in ' + Math.round(wait) + 'ms');
          await new Promise(function(r) { setTimeout(r, wait); });
        } else {
          throw err;
        }
      }
    }
    throw new Error('Failed after ' + maxRetries + ' retries');
  }

  function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  function posChange(entry) {
    var start = entry.position_start;
    var current = entry.position_current;
    if (start == null || current == null) return 0;
    return start - current;
  }

  function changeStr(change) {
    if (change > 0) return '\u25B2' + change;
    if (change < 0) return '\u25BC' + Math.abs(change);
    return '\u2014';
  }

  try {
    var results = await Promise.all([
      fetchJSON(API + '/drivers?session_key=latest').catch(function() { return []; }),
      fetchJSON(API + '/championship_teams?session_key=latest').catch(function() { return []; })
    ]);

    var driversRaw = results[0];
    var champTeams = results[1];

    var teamDrivers = {};
    (driversRaw || []).forEach(function(d) {
      var t = d.team_name || 'Unknown';
      if (!teamDrivers[t]) teamDrivers[t] = [];
      teamDrivers[t].push(d);
    });

    var sorted = (champTeams || []).slice().sort(function(a, b) {
      var pa = a.position_current || 999, pb = b.position_current || 999;
      return pa !== pb ? pa - pb : (b.points_current || 0) - (a.points_current || 0);
    });

    if (!sorted.length) {
      document.getElementById('content').innerHTML = '<div class="error-msg">Data unavailable</div>';
    } else {
      var top3 = sorted.slice(0, 3);
      var rest = sorted.slice(3);
      var html = '';

      // Top 3 Row
      html += '<div class="top3-row">';
      for (var i = 0; i < 3 && i < top3.length; i++) {
        var e = top3[i];
        var pos = e.position_current || (i + 1);
        var team = e.team_name || 'Team #' + (i + 1);
        var pts = e.points_current != null ? e.points_current : 0;
        var change = posChange(e);

        html += '<div class="top3-card">';
        html += '<span class="top3-pos-badge">P' + pos + '</span>';
        html += '<div class="top3-line1">' + esc(team) + '</div>';
        html += '<div class="top3-line2">' + pts + ' pts</div>';
        html += '<div class="top3-line3">' + changeStr(change) + '</div>';
        html += '</div>';
      }
      html += '</div>';

      // P4-P11 Grid
      if (rest.length) {
        html += '<div class="grid-container">';
        for (var i = 0; i < rest.length; i++) {
          var e = rest[i];
          var pos = e.position_current || (i + 4);
          var team = e.team_name || 'Team #' + (i + 4);
          var pts = e.points_current != null ? e.points_current : 0;
          var change = posChange(e);

          html += '<div class="grid-card">';
          html += '<span class="grid-watermark">P' + pos + '</span>';
          html += '<div class="grid-line1">' + esc(team) + '</div>';
          html += '<div class="grid-line2">' + changeStr(change) + '  ' + pts + ' pts</div>';
          html += '</div>';
        }
        html += '</div>';
      }

      document.getElementById('content').innerHTML = html;
    }
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="error-msg">Data unavailable</div>';
  }

  document.body.setAttribute('data-loaded', 'true');
})();
</script>
</body>
</html>
